services:
  imotrack-frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Server-side API calls (Next.js → backend, inside Docker network)
      - NEXT_API_URL=http://imotrack-backend:4000
      # Client-side API calls (browser → backend, must be publicly reachable)
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    restart: unless-stopped
    depends_on:
      - imotrack-backend

  imotrack-backend:
    build:
      context: ../imotrak-backside
    ports:
      - "4000:4000"
    env_file:
      - ../imotrak-backside/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
